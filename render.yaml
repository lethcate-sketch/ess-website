# Render Blueprint — ESS Flask API のみ（DB=Neon / Web=Vercel へ移行後）
# ------------------------------------------------------------------------------
# 構成（移行後）:
#   - DB        : Neon（無料 PostgreSQL・外部から到達可能）
#   - Web/BFF   : Vercel（Next.js。公開ページ・管理画面UI・LINE Webhook・BFFプロキシ）
#   - API       : Render 無料（この Flask。管理操作=書き込み・認証のみ）
#
# 設計判断:
#   1. LINE Webhook は Vercel(Next) 側にあるため、この Flask がスリープしても出欠受信に影響しない。
#      Flask のスリープが遅らせるのは管理操作のみで、Next BFF の起床待ちリトライが吸収する。
#   2. DATABASE_URL は Neon の接続文字列（外部到達可能）。低トラフィックのため直接接続(非プール)で十分。
#   3. JWT_SECRET は Vercel と「同一値」を設定する（Flask が署名・Next middleware/BFF が検証）。
#      2拠点に分かれたため自動生成にせず、ユーザーが1つ生成して両方へ設定する。
#   4. サービス間URL（NEXT_PUBLIC_SITE_URL=Vercelの公開URL）は初回デプロイ後にダッシュボードで設定。
# ------------------------------------------------------------------------------

services:
  - type: web
    name: ess-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      # Neon の接続文字列（postgresql://...）。ダッシュボードで設定（機密のためリポジトリに置かない）。
      - key: DATABASE_URL
        sync: false
      # Vercel と同一の共有シークレット。ダッシュボードで設定。
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_MIN
        value: "15"
      - key: JWT_REFRESH_EXPIRES_DAYS
        value: "14"
      - key: PYTHON_VERSION
        value: "3.12.8"
      # CORS 許可オリジン。Vercel の公開URL（https://...vercel.app）を初回デプロイ後に設定。
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
